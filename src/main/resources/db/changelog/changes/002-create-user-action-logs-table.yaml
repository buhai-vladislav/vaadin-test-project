databaseChangeLog:
  - changeSet:
      id: 002-create-user-action-logs-table
      author: vlad.buhai
      changes:
        - createTable:
            tableName: user_action_logs
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: true

              - column:
                  name: action
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: performed_by
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: performed_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: details
                  type: TEXT
                  constraints:
                    nullable: false

        - createIndex:
            tableName: user_action_logs
            indexName: idx_user_action_logs_user_id
            columns:
              - column:
                  name: user_id

        - createIndex:
            tableName: user_action_logs
            indexName: idx_user_action_logs_performed_at
            columns:
              - column:
                  name: performed_at