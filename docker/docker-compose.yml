version: "3.9"

services:
  db:
    image: postgres:16
    container_name: test-task-db
    environment:
      POSTGRES_DB: test_task_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d test_task_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
        context: ..
        dockerfile: docker/Dockerfile
    container_name: test-task-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/test_task_db?options=-c%20TimeZone=UTC
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"